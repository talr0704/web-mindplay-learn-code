<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>אתגר</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script>document.documentElement.setAttribute("data-theme",localStorage.getItem("mindplay-theme")||"dark");</script>
</head>
<body>
  <audio id="sfxRun" src="assets/sfx/run.wav" preload="auto"></audio>
  <audio id="sfxSuccess" src="assets/sfx/success.wav" preload="auto"></audio>
  <audio id="sfxError" src="assets/sfx/error.wav" preload="auto"></audio>

  <header class="top">
    <a class="link topBack" href="./index.html">← חזרה</a>
    <h1 id="title">אתגר</h1>
    <p id="subtitle" class="sub"></p>
  </header>

  <main class="container">
    <section class="card card--explain">
      <div class="row" style="justify-content:flex-end;">
        <span class="badge" id="progressBadge">אתגר</span>
      </div>

      <h2>הסבר</h2>
      <div id="explain" class="text"></div>
    </section>

    <section class="card card--task">
      <h2>משימה</h2>
      <div id="task" class="text"></div>
      <p class="mini">טיפ: בפייתון מדפיסים עם <code>print()</code>.</p>
    </section>

    <section id="codeCard" class="card card--code">
      <h2>כתבו קוד כאן (Python)</h2>
      <textarea id="editor" class="editor" spellcheck="false"></textarea>

      <div class="runBar">
        <div class="runButtonsRow">
          <div class="runLeft">
            <button id="hintBtn" class="btn btnGhost">רמז</button>
            <button id="solutionBtn" class="btn btnGhost">הצג פתרון</button>
          </div>

          <div class="runRight">
            <button id="resetBtn" class="btn btnGhost">אפס</button>
            <button id="runBtn" class="btn">הרץ ▶</button>
          </div>
        </div>

        <div id="status" class="status"></div>
      </div>

      <div id="hint" class="hint hidden"></div>
      <pre id="solution" class="solution hidden"></pre>

      <h3 class="mini" style="margin-top:14px;">פלט</h3>
      <pre id="output" class="output"></pre>

      <div class="row" style="justify-content:flex-end;">
        <button id="nextBtn" class="btn btnGreen">הבא ←</button>
      </div>
    </section>

    <section id="fallbackCard" class="card card--practice hidden">
      <h2>תרגול</h2>
      <div id="fallbackArea"></div>
      <div id="practiceAreaFeedback" class="feedbackArea"></div>

      <div class="row" style="justify-content:flex-end; margin-top:14px;">
        <button id="nextBtnFallback" class="btn btnGreen">הבא ←</button>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
  <script src="data/challenges.js"></script>
  <script src="js/runner.js"></script>
  <script src="js/question-renderers.js"></script>
  <script src="js/challenge.js"></script>
  <script src="js/theme.js"></script>
</body>
</html>
